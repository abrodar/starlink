databaseChangeLog:
  - include:
      file: db/changelog/changelog.yaml
  - include:
      file: db/changelog/changelog-generated.yaml
  - changeSet:
      id: 4-fix-column-type-mismatches
      author: aljaz
      changes:
        - modifyDataType:
            tableName: satellite_orbits
            columnName: mean_motion
            newDataType: DOUBLE
        - modifyDataType:
            tableName: satellite_orbits
            columnName: eccentricity
            newDataType: DOUBLE
        - modifyDataType:
            tableName: satellite_orbits
            columnName: inclination
            newDataType: DOUBLE
        - modifyDataType:
            tableName: satellite_orbits
            columnName: ra_of_asc_node
            newDataType: DOUBLE
        - modifyDataType:
            tableName: satellite_orbits
            columnName: arg_of_pericenter
            newDataType: DOUBLE
        - modifyDataType:
            tableName: satellite_orbits
            columnName: mean_anomaly
            newDataType: DOUBLE
        - modifyDataType:
            tableName: satellite_orbits
            columnName: bstar
            newDataType: DOUBLE
        - modifyDataType:
            tableName: satellite_orbits
            columnName: mean_motion_dot
            newDataType: DOUBLE
        - modifyDataType:
            tableName: satellite_orbits
            columnName: mean_motion_ddot
            newDataType: DOUBLE
        - modifyDataType:
            tableName: satellite_orbits
            columnName: ephemeris_type
            newDataType: BIGINT
        - modifyDataType:
            tableName: satellite_orbits
            columnName: element_set_no
            newDataType: BIGINT
        - modifyDataType:
            tableName: satellite_orbits
            columnName: rev_at_epoch
            newDataType: BIGINT
  - changeSet:
      id: 5-fix-epoch-column-type
      author: aljaz
      changes:
        - modifyDataType:
            tableName: satellite_orbits
            columnName: epoch
            newDataType: DATETIME